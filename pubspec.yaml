name: android_finder
description: "Cross-platform Android file manager using ADB"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  path: ^1.9.0
  desktop_drop: ^0.4.4
  file_picker: ^8.0.0
  intl: ^0.19.0
  collection: ^1.18.0
  path_provider: ^2.1.3
  window_manager: ^0.3.9
  shared_preferences: ^2.2.3
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  freezed: ^2.5.2
  build_runner: ^2.4.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
